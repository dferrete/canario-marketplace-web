version: '3.8'

services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/canario-marketplace-web:${IMAGE_TAG:-latest}
    container_name: canario_web_prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - canario_web_net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: canario_web_nginx_prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - canario_web_net
    depends_on:
      - web
    restart: always

networks:
  canario_web_net:
    driver: bridge
