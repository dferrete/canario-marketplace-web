version: '3.8'

services:
  web:
    build:
      context: .
    container_name: canario_web_dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped
    networks:
      - canario_web_net

networks:
  canario_web_net:
    driver: bridge
